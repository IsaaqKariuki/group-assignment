<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

  <!-- contact card-contact section -->
  <section class="contact-section">
    <h2>Get In Touch</h2>

    <div class="cards-grid">

      <a class="card" href="mailto:alex.johnson@email.com">
        <div class="card-icon icon-email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
        <div>
          <div class="card-label">Email</div>
          <div class="card-value">alex.johnson@email.com</div>
        </div>
      </a>

      <a class="card" href="tel:+15551234567">
        <div class="card-icon icon-phone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 11.93 19.79 19.79 0 0 1 1.07 3.3 2 2 0 0 1 3.05 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16l.92.92z"/>
          </svg>
        </div>
        <div>
          <div class="card-label">Phone</div>
          <div class="card-value">+1 (555) 123-4567</div>
        </div>
      </a>

      <a class="card" href="https://linkedin.com/in/alexjohnson" target="_blank" rel="noopener">
        <div class="card-icon icon-linkedin">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
          </svg>
        </div>
        <div>
          <div class="card-label">LinkedIn</div>
          <div class="card-value">linkedin.com/in/alexjohnson</div>
        </div>
      </a>

      <a class="card" href="https://github.com/alexjohnson" target="_blank" rel="noopener">
        <div class="card-icon icon-github">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
          </svg>
        </div>
        <div>
          <div class="card-label">GitHub</div>
          <div class="card-value">github.com/alexjohnson</div>
        </div>
      </a>

    </div>
  </section>

</body>
</html>
