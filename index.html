<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="form-section">
        <h2>Send a Message</h2>
        <p>
            Have a question or want to work together? Fill out the form below and I'll get back to you soon.
        </p>
        <form id="form" action="" method="" name="biodata">
            <label for="first-name">First Name</label>
            <input id="first-name" type="text" placeholder="John" required></input>

            <label for="last-name">Last Name</label>
            <input id="last-name" type="text" placeholder="Doe" required></input>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="johndoe@example.com" required></input>

            <label for="subject">Subject</label>
            <input id="subject" type="text" placeholder="Project Inquiry" required></input>

            <label for="message">Message</label>
            <textarea id="message" placeholder="Tell me about your project..." ></textarea>

            <div class="btn-container">
                <button id="send-btn" type="submit"><i class="fa-regular fa-paper-plane"></i> Send</button>
                <button id="clear-btn" type="reset"><i class="fa-solid fa-rotate-left"></i> Clear</button>
            </div>
            
        </form>
    </section>
    <script src="./script.js"></script>
</body>
</html>
